<div class="employee-list-container">
    <div class="header-actions">
        <button mat-raised-button color="primary" (click)="goBackToHome()">
            <mat-icon>arrow_back</mat-icon>
            Voltar
        </button>
        <button mat-raised-button color="accent" *ngIf="hasScope('users.create')" (click)="openAddUserDialog()">
            <mat-icon>person_add</mat-icon>
            Adicionar Funcionário
        </button>
    </div>
    <h2>Lista de Funcionários</h2>
    <table mat-table [dataSource]="users" class="mat-elevation-z8">

        <!-- Nome Column -->
        <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let user"> {{user.nome}} </td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef> Email </th>
            <td mat-cell *matCellDef="let user"> {{user.email}} </td>
        </ng-container>

        <!-- Perfil Acesso Column -->
        <ng-container matColumnDef="perfilAcesso">
            <th mat-header-cell *matHeaderCellDef> Perfil de Acesso </th>
            <td mat-cell *matCellDef="let user">
                <mat-form-field appearance="outline" class="profile-select" style="margin-top:20px">
                    <mat-select [value]="user.perfilAcesso" (selectionChange)="updateProfile(user, $event.value)">
                        <mat-option *ngFor="let profile of accessProfiles" [value]="profile">
                            {{ profile }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </td>
        </ng-container>

        <!-- Status and Actions Column -->
        <ng-container matColumnDef="statusActions">
            <th mat-header-cell *matHeaderCellDef> Status / Ações </th>
            <td mat-cell *matCellDef="let user">
                <mat-slide-toggle [checked]="isActive(user.status)" (change)="toggleStatus(user)"
                    [matTooltip]="isActive(user.status) ? 'Ativo - Clique para desativar' : 'Inativo - Clique para ativar'">
                    {{ isActive(user.status) ? 'Ativo' : 'Inativo' }}
                </mat-slide-toggle>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
