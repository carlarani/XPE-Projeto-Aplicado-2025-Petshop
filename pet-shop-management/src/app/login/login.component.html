<div class="login-container">
    <mat-card class="login-card">
        <mat-card-header>
            <div class="header-content">
                <img src="logo.png" alt="AgendaPet Logo" class="logo" />
                <mat-card-title>AgendaPet</mat-card-title>
                <mat-card-subtitle>Sistema de Agendamento</mat-card-subtitle>
            </div>
        </mat-card-header>

        <mat-card-content>
            <!-- Error Message -->
            <div *ngIf="errorMessage" class="error-message">
                <mat-icon>error_outline</mat-icon>
                <span>{{ errorMessage }}</span>
            </div>

            <form [formGroup]="loginForm">
                <!-- Email Field -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" formControlName="email" placeholder="seu.email@example.com" />
                    <mat-icon matPrefix>email</mat-icon>
                    <mat-error *ngIf="email?.hasError('required')">
                        Email é obrigatório
                    </mat-error>
                    <mat-error *ngIf="email?.hasError('email')">
                        Email inválido
                    </mat-error>
                </mat-form-field>

                <!-- Password Field -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Senha</mat-label>
                    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password"
                        placeholder="Digite sua senha" />
                    <mat-icon matPrefix>lock</mat-icon>
                    <button mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button"
                        class="toggle-password">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="password?.hasError('required')">
                        Senha é obrigatória
                    </mat-error>
                    <mat-error *ngIf="password?.hasError('minlength')">
                        Senha deve ter no mínimo 6 caracteres
                    </mat-error>
                </mat-form-field>

                <!-- Remember Me -->
                <div class="checkbox-container">
                    <mat-checkbox formControlName="rememberMe">
                        Lembrar de mim
                    </mat-checkbox>
                </div>

                <!-- Login Button -->
                <button mat-raised-button color="primary" class="full-width login-button" (click)="onLogin()"
                    [disabled]="loginForm.invalid || isLoading">
                    <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
                    <span *ngIf="!isLoading">Entrar</span>
                </button>
            </form>
        </mat-card-content>
    </mat-card>
</div>
